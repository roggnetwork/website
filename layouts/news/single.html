{{ define "main" }}
<div class="container">
  <article class="news-article">
    <nav class="breadcrumb">
      <a href="{{ "/news/" | relURL }}">News</a> &gt; {{ .Title }}
    </nav>

    <time class="news-date" datetime="{{ .Date.Format "2006-01-02" }}">
      {{ .Date.Format "2006-01-02" }}
    </time>

    <div class="news-content">
      {{ .Content }}
    </div>
  </article>
</div>
{{ end }}
